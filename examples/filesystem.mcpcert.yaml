# Example mcpcert test file.
# Run with:  mcpcert run --file examples/filesystem.mcpcert.yaml
server: "npx -y @modelcontextprotocol/server-filesystem /tmp"
tests:
  - name: list_allowed_directories succeeds
    tool: list_allowed_directories
    expect:
      error: false

  - name: list_directory denies access outside the allowed root
    tool: list_directory
    input: { path: "/etc" }
    expect:
      error: true
